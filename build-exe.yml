name: Build GeoFEA-2D EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build onefile EXE
        run: |
          pyinstaller --onefile --noconsole --clean --name GeoFEA-2D `
            --collect-all PySide6 --collect-submodules PySide6 --collect-all matplotlib `
            geofea_app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeoFEA-2D-exe
          path: dist/GeoFEA-2D.exe
